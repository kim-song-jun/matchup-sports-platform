# ─────────────────────────────────────────────────────────────
# Git LFS reminder — baseline images tend to balloon
# Uncomment the tip to let scaffold-autoqa.sh install
# a .gitattributes entry.
# ─────────────────────────────────────────────────────────────
git_lfs:
  install_gitattributes: true           # `.autoqa/baseline/ filter=lfs diff=lfs merge=lfs -text`
