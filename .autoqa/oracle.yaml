          - { selector: "#merc-venue", aria_role: "*" }
      - { id: STEP-05, action: assert_no_console_errors }

  - id: SC-COMMS-001
    description: "Notification center, mark-all-read, and feed grouping"
    scope: core
    personas: [sinaro]
    source_ref: "apps/web/src/app/(main)/notifications/page.tsx"
    steps:
      - { id: STEP-01, action: navigate, target: /notifications }
      - id: STEP-02
        action: assert_dom
        assertions:
          - { selector: "[data-testid^='notification-card-']", aria_role: "*" }
      - { id: STEP-03, action: click, selector: "button[aria-label='모든 알림 읽음 처리']" }
      - id: STEP-04
        action: db_checkpoint
        db_verify_level: target_row
        expect:
          counts:
            notifications: "+0"
          target:
            query: |
              SELECT COUNT(*)::int AS unread_count
              FROM notifications n
              JOIN users u ON u.id = n.user_id
              WHERE u.nickname = $1 AND n.is_read = false;
            params: ["${AUTOQA_SINARO_LABEL}"]
            expect_rows: 1
            expect_columns:
              unread_count: 0
      - { id: STEP-05, action: navigate, target: /feed }
      - { id: STEP-06, action: screenshot, baseline_ref: auto, diff_threshold_pct: 1.0 }
      - { id: STEP-07, action: assert_no_console_errors }

