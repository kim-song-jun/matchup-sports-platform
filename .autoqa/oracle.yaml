      - { id: STEP-05, action: assert_no_console_errors }

  - id: SC-TEAM-002
    description: "Member self-leave flow and members surface sync"
    scope: core
    personas: [team-member]
    source_ref: "apps/web/src/app/(main)/teams/[id]/members/page.tsx"
    steps:
      - { id: STEP-01, action: navigate, target: /my/teams }
      - { id: STEP-02, action: click, selector: "[data-testid^='my-team-members-']" }
      - { id: STEP-03, action: wait_url, pattern: "/teams/[^/]+/members(?:\\?.*)?$", timeout_ms: 10000 }
      - id: STEP-04
        action: assert_dom
        assertions:
          - { selector: "[data-testid='team-members-heading']", aria_role: "*" }
      - { id: STEP-05, action: click, selector: "[data-testid='team-member-leave-self']" }
      - { id: STEP-06, action: click, selector: "button.bg-red-500" }
      - { id: STEP-07, action: wait_url, pattern: "/my/teams(?:\\?.*)?$", timeout_ms: 10000 }
      - id: STEP-08
        action: db_checkpoint
        db_verify_level: target_row
        expect:
          counts:
            team_memberships: "+0"
          target:
            query: |
              SELECT (left_at IS NOT NULL) AS left_team
              FROM team_memberships tm
              JOIN users u ON u.id = tm.user_id
              WHERE u.nickname = $1
              ORDER BY tm.joined_at DESC
              LIMIT 1;
            params: ["${AUTOQA_TEAM_MEMBER_LABEL}"]
            expect_rows: 1
            expect_columns:
              left_team: true
          landing_screen:
            after_ms: 500
            navigate: /my/teams
            assert_contains_text: "내 팀"

  - id: SC-TEAMMATCH-001
    description: "Team-match list shell and new-post form surface"
    scope: core
    personas: [team-owner]
    source_ref: "apps/web/src/app/(main)/team-matches/new/page.tsx"
