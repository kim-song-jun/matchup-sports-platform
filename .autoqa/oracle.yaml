  - id: SC-SMOKE-001
    description: "Smoke — landing shell resolves without critical console errors"
    scope: minimal
    personas: [guest]
    source_ref: "apps/web/src/app/landing/page.tsx"
    steps:
      - { id: STEP-01, action: navigate, target: /landing }
      - { id: STEP-02, action: wait_url, pattern: "/landing(?:\\?|$)", timeout_ms: 8000 }
      - { id: STEP-03, action: screenshot, baseline_ref: auto, diff_threshold_pct: 1.0 }
      - id: STEP-04
        action: assert_dom
        assertions:
          - { selector: "body", aria_role: "*" }
          - { selector: "nav", aria_role: "*" }
      - { id: STEP-05, action: assert_no_console_errors }

  - id: SC-SMOKE-002
    description: "Smoke — authenticated matches route renders"
    scope: core
    personas: [team-owner]
    source_ref: "apps/web/src/app/(main)/matches/matches-client.tsx"
    steps:
      - { id: STEP-01, action: navigate, target: /matches }
      - { id: STEP-02, action: wait, ms: 500 }
      - { id: STEP-03, action: screenshot, baseline_ref: auto, diff_threshold_pct: 1.0 }
      - id: STEP-04
        action: assert_dom
        assertions:
          - { selector: "[data-testid='match-results']", aria_role: "*" }
      - { id: STEP-05, action: assert_no_console_errors }

  - id: SC-SMOKE-003
    description: "Smoke — root route redirects guest to landing"
    scope: minimal
    personas: [guest]
    source_ref: "apps/web/src/app/page.tsx"
    steps:
      - { id: STEP-01, action: navigate, target: / }
      - { id: STEP-02, action: wait_url, pattern: "/landing(?:\\?|$)", timeout_ms: 8000 }
      - { id: STEP-03, action: screenshot, baseline_ref: auto, diff_threshold_pct: 1.0 }
      - { id: STEP-04, action: assert_no_console_errors }

  - id: SC-AUTH-001
    description: "Login shell and guest protection redirects"
    scope: core
    personas: [guest]
    source_ref: "apps/web/src/app/(auth)/login/page.tsx"
    steps:
      - { id: STEP-01, action: navigate, target: /login }
      - id: STEP-02
        action: assert_dom
        assertions:
          - { selector: "[data-testid='login-page']", aria_role: "*" }
          - { selector: "[data-testid='browse-without-login']", aria_role: "*" }
      - { id: STEP-03, action: navigate, target: /profile }
      - { id: STEP-04, action: wait_url, pattern: "/login(?:\\?|$)", timeout_ms: 8000 }
      - { id: STEP-05, action: navigate, target: /admin/dashboard }
      - { id: STEP-06, action: wait_url, pattern: "/login(?:\\?|$)", timeout_ms: 8000 }
      - { id: STEP-07, action: assert_no_console_errors }

  - id: SC-HOME-001
    description: "Authenticated home feed and discovery deep-link shell"
    scope: core
    personas: [sinaro]
    source_ref: "apps/web/src/app/(main)/home/home-client.tsx"
    steps:
      - { id: STEP-01, action: navigate, target: /home }
      - { id: STEP-02, action: wait, ms: 600 }
      - { id: STEP-03, action: screenshot, baseline_ref: auto, diff_threshold_pct: 1.0 }
      - id: STEP-04
        action: assert_dom
        assertions:
          - { selector: "header", contains_text: ["오늘의 매치"] }
      - { id: STEP-05, action: navigate, target: "/matches?sport=futsal" }
      - id: STEP-06
        action: assert_dom
        assertions:
          - { selector: "[data-testid='match-results']", aria_role: "*" }
      - { id: STEP-07, action: assert_no_console_errors }

  - id: SC-MATCH-001
    description: "Create a match and verify list-detail persistence"
    scope: core
    personas: [sinaro]
    source_ref: "apps/web/src/app/(main)/matches/new/page.tsx"
    landing_route: /matches/${scenario.variables.new_match_id}
    variables:
      new_match_id: null
    steps:
      - { id: STEP-01, action: navigate, target: /matches/new }
      - { id: STEP-02, action: click, selector: "[data-testid='match-sport-futsal']" }
      - { id: STEP-03, action: click, selector: "[data-testid='match-create-next-sport']" }
      - { id: STEP-04, action: type, selector: "#match-title", value: "AUTOQA Match Core" }
      - { id: STEP-05, action: type, selector: "#match-description", value: "Autoqa generated match scenario." }
      - { id: STEP-06, action: type, selector: "#match-maxPlayers", value: "10" }
      - { id: STEP-07, action: type, selector: "#match-fee", value: "0" }
      - { id: STEP-08, action: click, selector: "[data-testid='match-create-next-info']" }
      - { id: STEP-09, action: click, selector: "[data-testid^='match-venue-']" }
      - { id: STEP-10, action: type, selector: "#match-date", value: "2099-12-31" }
      - { id: STEP-11, action: type, selector: "#match-startTime", value: "18:00" }
      - { id: STEP-12, action: type, selector: "#match-endTime", value: "20:00" }
      - { id: STEP-13, action: click, selector: "[data-testid='match-create-next-schedule']" }
      - { id: STEP-14, action: click, selector: "[data-testid='match-create-submit']" }
      - { id: STEP-15, action: wait_url, pattern: "/matches\\?created=true", timeout_ms: 15000 }
      - id: STEP-16
        action: db_checkpoint
        db_verify_level: target_row
        expect:
          counts:
            matches: ">=+1"
          target:
            query: |
              SELECT id, title, status
              FROM matches
              WHERE title = $1
              ORDER BY created_at DESC
              LIMIT 1;
            params: ["AUTOQA Match Core"]
            expect_rows: 1
            expect_columns:
              title: "AUTOQA Match Core"
            capture:
              new_match_id: id
          landing_screen:
            after_ms: 800
            navigate: /matches/${scenario.variables.new_match_id}
            assert_contains_text: "AUTOQA Match Core"

  - id: SC-MATCH-002
    description: "Match discovery filters and detail shell"
    scope: core
    personas: [team-owner]
    source_ref: "apps/web/src/app/(main)/matches/matches-client.tsx"
    steps:
      - { id: STEP-01, action: navigate, target: /matches }
      - { id: STEP-02, action: type, selector: "[data-testid='match-search-input']", value: "풋살" }
      - { id: STEP-03, action: click, selector: "[data-testid='match-filter-toggle']" }
      - { id: STEP-04, action: click, selector: "[data-testid='match-quick-free']" }
      - { id: STEP-05, action: screenshot, baseline_ref: auto, diff_threshold_pct: 1.0 }
      - { id: STEP-06, action: click, selector: "a[href^='/matches/']" }
      - { id: STEP-07, action: wait_url, pattern: "/matches/[^/]+$", timeout_ms: 10000 }
      - id: STEP-08
        action: assert_dom
        assertions:
          - { selector: "[data-testid='match-detail-title']", aria_role: "*" }
      - { id: STEP-09, action: assert_no_console_errors }

  - id: SC-TEAM-001
