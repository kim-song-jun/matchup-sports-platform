      - id: STEP-04
        action: assert_dom
        assertions:
          - { selector: "#match-title", aria_role: "*" }
          - { selector: "#match-date", aria_role: "*" }
          - { selector: "#venue-name", aria_role: "*" }
      - { id: STEP-05, action: navigate, target: /my/team-matches }
      - id: STEP-06
        action: assert_dom
        assertions:
          - { selector: "[role='tab']", min_rows: 2 }
      - { id: STEP-07, action: assert_no_console_errors }

  - id: SC-MERC-001
    description: "Mercenary board shell and create-post form surface"
    scope: core
