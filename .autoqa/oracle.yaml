version: 2

app:
  base_url: http://localhost:3003
  health_path: /landing
  personas:
    - id: guest
      login_scenario: null
      storage_state_file: null
      expected_access: public-only
    - id: sinaro
      login_scenario: SC-LOGIN-SINARO
      storage_state_file: .autoqa/cookies/sinaro.json
      expected_access: authenticated
    - id: team-owner
      login_scenario: SC-LOGIN-TEAM-OWNER
      storage_state_file: .autoqa/cookies/team-owner.json
      expected_access: authenticated
    - id: team-manager
      login_scenario: SC-LOGIN-TEAM-MANAGER
      storage_state_file: .autoqa/cookies/team-manager.json
      expected_access: authenticated
    - id: team-member
      login_scenario: SC-LOGIN-TEAM-MEMBER
      storage_state_file: .autoqa/cookies/team-member.json
      expected_access: authenticated
    - id: mercenary-host
      login_scenario: SC-LOGIN-MERCENARY-HOST
      storage_state_file: .autoqa/cookies/mercenary-host.json
      expected_access: authenticated
    - id: seller
      login_scenario: SC-LOGIN-SELLER
      storage_state_file: .autoqa/cookies/seller.json
      expected_access: authenticated
    - id: instructor
      login_scenario: SC-LOGIN-INSTRUCTOR
      storage_state_file: .autoqa/cookies/instructor.json
      expected_access: authenticated
    - id: admin
      login_scenario: SC-LOGIN-ADMIN
      storage_state_file: .autoqa/cookies/admin.json
      expected_access: authenticated-plus-db-role-promotion-for-admin-routes

viewport_matrix:
  mobile:
    sm: { width: 375, height: 667 }
    lg: { width: 430, height: 932 }
  tablet:
    portrait: { width: 768, height: 1024 }
    landscape: { width: 1024, height: 1366 }
  desktop:
    md: { width: 1280, height: 800 }
    lg: { width: 1440, height: 900 }
    xl: { width: 1920, height: 1080 }
    "2xl": { width: 2560, height: 1440 }
    "3xl": { width: 3440, height: 1440 }

themes: [light, dark]

scope_profiles:
  minimal: { viewports: [desktop.lg], themes: [light], personas: [guest] }
  core: { viewports: [mobile.lg, tablet.portrait, desktop.lg, desktop.xl], themes: [light, dark], personas: [guest, sinaro, team-owner, team-member, seller, instructor, admin] }
  all: { viewports: "*", themes: "*", personas: "*" }

area_map:
  "/": DASH
  "/landing": LANDING
  "/about": ABOUT
  "/guide": GUIDE
  "/pricing": PRICING
  "/faq": FAQ
  "/login": LOGIN
  "/callback/": CALLBACK
  "/home": HOME
  "/feed": FEED
  "/onboarding": ONBOARD
  "/matches": MATCH
  "/matches/": MATCH-DETAIL
  "/team-matches": TEAMMATCH
  "/team-matches/": TEAMMATCH-DETAIL
  "/teams": TEAM
  "/teams/": TEAM-DETAIL
  "/mercenary": MERC
  "/mercenary/": MERC-DETAIL
  "/marketplace/orders/": MARKET-ORDER
  "/marketplace": MARKET
  "/marketplace/": MARKET-DETAIL
  "/lessons": LESSON
  "/lessons/": LESSON-DETAIL
  "/chat": COMMS
  "/chat/": CHAT-ROOM
  "/notifications": COMMS
  "/profile": ACCOUNT
  "/settings": ACCOUNT
  "/payments/checkout": PAY
  "/payments/": PAY-DETAIL
  "/payments": PAY
  "/reviews": TRUST
  "/badges": TRUST
  "/my/": MY
  "/user/": USER
  "/users/": USER-PUBLIC
  "/venues": HUB
  "/venues/": HUB-DETAIL
  "/tournaments": HUB
  "/tournaments/": HUB-DETAIL
  "/admin": ADMIN
  "/admin/": ADMIN-DETAIL

scenarios:
  - id: SC-LOGIN-SINARO
    description: "Bootstrap sinaro Playwright storage state via dev-login persona label"
    scope: minimal
    personas: [__bootstrap__]
    source_ref: "apps/web/src/app/(auth)/login/page.tsx"
    steps:
      - { id: STEP-01, action: navigate, target: /login }
      - { id: STEP-02, action: type, selector: "[data-testid='dev-login-input']", value: "${AUTOQA_SINARO_LABEL}" }
      - { id: STEP-03, action: click, selector: "[data-testid='dev-login-submit']" }
      - { id: STEP-04, action: wait_url, pattern: "/home(?:\\?|$)", timeout_ms: 15000 }
      - { id: STEP-05, action: export_storage_state, to: ".autoqa/cookies/sinaro.json" }

  - id: SC-LOGIN-TEAM-OWNER
