name: Deploy Alpha

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: deploy-alpha
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release commit
        id: release
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          if [[ ! "${RELEASE_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid release SHA" >&2
            exit 1
          fi
          echo "sha=${RELEASE_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Wait for matching CI success
        timeout-minutes: 35
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          for attempt in $(seq 1 210); do
            ci_result="$(gh api \
              "repos/${REPOSITORY}/actions/workflows/deploy.yml/runs?branch=dev&event=push&per_page=100" \
              --jq "[.workflow_runs[] | select(.head_sha == \"${RELEASE_SHA}\")][0] | if . == null then empty else [.status, (.conclusion // \"pending\")] | @tsv end")"

            if [[ -n "${ci_result}" ]]; then
              read -r ci_status ci_conclusion <<< "${ci_result}"
              if [[ "${ci_status}" == "completed" ]]; then
                if [[ "${ci_conclusion}" == "success" ]]; then
                  echo "Matching CI run passed"
                  exit 0
                fi
                echo "Matching CI run finished with ${ci_conclusion}" >&2
                exit 1
              fi
            fi
            sleep 10
          done

          echo "Matching CI run did not finish within 35 minutes" >&2
          exit 1

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.sha }}
          fetch-depth: 0

      - name: Resolve Changesets alpha version
        id: version
        env:
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
        run: |
          set -Eeuo pipefail
          release_date="$(git show -s --format=%cs "${RELEASE_SHA}")"
          metadata="$(node scripts/release/resolve-changeset-version.mjs \
            --repo . \
            --sha "${RELEASE_SHA}" \
            --date "${release_date}")"
          prerelease="$(jq -er '.prereleaseVersion' <<< "${metadata}")"
          stable="$(jq -er '.stableVersion' <<< "${metadata}")"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "stable=${stable}" >> "${GITHUB_OUTPUT}"
          echo "Alpha release ${prerelease}; planned stable ${stable}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ALPHA_AWS_ROLE_ARN }}
          aws-region: ${{ vars.ALPHA_AWS_REGION }}

      - name: Package release
        env:
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
        run: |
          set -Eeuo pipefail
          tar -czf "/tmp/teameet-alpha-${RELEASE_SHA}.tar.gz" \
            .changeset \
            .dockerignore \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml \
            apps/v1_api \
            apps/v1_web \
            deploy \
            scripts/release

      - name: Upload versioned release artifact
        env:
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          DEPLOY_BUCKET: ${{ vars.ALPHA_DEPLOY_BUCKET }}
        run: |
          set -Eeuo pipefail
          aws s3 cp \
            "/tmp/teameet-alpha-${RELEASE_SHA}.tar.gz" \
            "s3://${DEPLOY_BUCKET}/releases/${RELEASE_SHA}.tar.gz" \
            --only-show-errors

      - name: Deploy through AWS Systems Manager
        timeout-minutes: 45
        env:
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          RELEASE_VERSION: ${{ steps.version.outputs.prerelease }}
          DEPLOY_BUCKET: ${{ vars.ALPHA_DEPLOY_BUCKET }}
          INSTANCE_ID: ${{ vars.ALPHA_EC2_INSTANCE_ID }}
          GA_MEASUREMENT_ID: ${{ secrets.GA_ALPHA }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          # alpha.teameet.co.kr has its own Kakao OAuth redirect target, distinct
          # from teameet.co.kr's — the client_id/secret are shared (same Kakao app),
          # but reusing the production KAKAO_REDIRECT_URI here would send the OAuth
          # callback to the wrong domain and break the login round trip.
          KAKAO_REDIRECT_URI: ${{ secrets.ALPHA_KAKAO_REDIRECT_URI }}
          OCTOMO_API_KEY: ${{ secrets.OCTOMO_API_KEY }}
        run: |
          set -Eeuo pipefail
          stage="/home/ec2-user/.teameet-alpha-staging/${RELEASE_SHA}"
          archive="/tmp/teameet-alpha-${RELEASE_SHA}.tar.gz"
          object="s3://${DEPLOY_BUCKET}/releases/${RELEASE_SHA}.tar.gz"

          parameters="$(jq -nc \
            --arg strict "set -Eeuo pipefail" \
            --arg cleanup "trap 'status=\$?; rm -f '${archive}'; rm -rf '${stage}'; exit \${status}' EXIT" \
            --arg prepare "install -d -o ec2-user -g ec2-user '${stage}'" \
            --arg download "aws s3 cp '${object}' '${archive}' --only-show-errors" \
            --arg extract "tar -xzf '${archive}' -C '${stage}' && chown -R ec2-user:ec2-user '${stage}'" \
            --arg deploy "sudo -u ec2-user -H env ALPHA_SOURCE_DIR='${stage}' ALPHA_SHA='${RELEASE_SHA}' ALPHA_RELEASE_VERSION='${RELEASE_VERSION}' GA_MEASUREMENT_ID='${GA_MEASUREMENT_ID}' KAKAO_CLIENT_ID='${KAKAO_CLIENT_ID}' KAKAO_CLIENT_SECRET='${KAKAO_CLIENT_SECRET}' KAKAO_REDIRECT_URI='${KAKAO_REDIRECT_URI}' OCTOMO_API_KEY='${OCTOMO_API_KEY}' bash '${stage}/deploy/deploy-alpha.sh'" \
            '{commands: [$strict, $cleanup, $prepare, $download, $extract, $deploy]}'
          )"

          command_id="$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name AWS-RunShellScript \
            --comment "Teameet alpha ${RELEASE_VERSION} ${RELEASE_SHA}" \
            --parameters "${parameters}" \
            --query 'Command.CommandId' \
            --output text)"

          for attempt in $(seq 1 180); do
            status="$(aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${INSTANCE_ID}" \
              --query Status \
              --output text 2>/dev/null || true)"
            case "${status}" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "${command_id}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query StandardOutputContent \
                  --output text
                exit 0
                ;;
              Failed|TimedOut|Cancelled|Cancelling)
                aws ssm get-command-invocation \
                  --command-id "${command_id}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query '{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}' \
                  --output json
                exit 1
                ;;
            esac
            sleep 10
          done

          echo "Alpha deployment did not finish within 30 minutes" >&2
          exit 1

      - name: Verify public alpha release identity
        env:
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          RELEASE_VERSION: ${{ steps.version.outputs.prerelease }}
        run: |
          set -Eeuo pipefail
          for attempt in $(seq 1 36); do
            headers="$(curl -fsSI https://alpha.teameet.co.kr/landing 2>/dev/null || true)"
            deployed_version="$(awk -F': ' 'tolower($1) == "x-teameet-release" { gsub("\r", "", $2); print $2 }' <<< "${headers}")"
            deployed_sha="$(awk -F': ' 'tolower($1) == "x-teameet-commit" { gsub("\r", "", $2); print $2 }' <<< "${headers}")"
            db_healthy="$(curl -fsS https://alpha.teameet.co.kr/api/v1/health 2>/dev/null | jq -r '.data.checks.db // false' 2>/dev/null || true)"
            if [[ "${deployed_version}" == "${RELEASE_VERSION}" && "${deployed_sha}" == "${RELEASE_SHA}" && "${db_healthy}" == "true" ]]; then
              exit 0
            fi
            sleep 5
          done

          echo "Alpha did not expose the expected release identity within 3 minutes" >&2
          echo "expected_version=${RELEASE_VERSION} observed_version=${deployed_version:-missing}" >&2
          echo "expected_sha=${RELEASE_SHA} observed_sha=${deployed_sha:-missing} db_healthy=${db_healthy:-false}" >&2
          exit 1
