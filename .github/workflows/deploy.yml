name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reset_db:
        description: 'DANGER: Drop all tables, re-run migrations, re-seed'
        required: false
        default: false
        type: boolean
      run_seed:
        description: 'DANGER: Run destructive full seed data refresh'
        required: false
        default: false
        type: boolean

jobs:
  # ── Test job: runs on every push and PR ─────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: matchup_test
          POSTGRES_PASSWORD: matchup_test
          POSTGRES_DB: matchup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U matchup_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://matchup_test:matchup_test@localhost:5432/matchup_test
      JWT_SECRET: ci-test-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd apps/api && pnpm prisma generate

      - name: Lint (all packages)
        run: pnpm lint

      - name: Type-check api
        run: cd apps/api && npx tsc --noEmit

      - name: Type-check web
        run: cd apps/web && npx tsc --noEmit

      - name: Test api
        run: pnpm --filter api test

      - name: Test web
        run: pnpm --filter web test

  # ── Deploy job: runs on push to main or manual dispatch, after tests pass ──
  deploy:
    name: Deploy
    needs: test
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 400 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host ec2
            HostName ${{ secrets.EC2_HOST }}
            User ec2-user
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Sync code
        run: |
          rsync -avz --delete \
            --exclude node_modules --exclude .next --exclude dist --exclude .git --exclude 'deploy/certbot' \
            --filter 'protect deploy/.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ec2-user@${{ secrets.EC2_HOST }}:~/matchup/

      - name: Build and deploy
        timeout-minutes: 20
        env:
          RESET_DB: ${{ inputs.reset_db }}
          RUN_SEED: ${{ inputs.run_seed }}
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 ec2 "RESET_DB='${RESET_DB:-}' RUN_SEED='${RUN_SEED:-}' bash -se" <<'EOF'
          set -euo pipefail

          RESET_DB="${RESET_DB:-false}"
          RUN_SEED="${RUN_SEED:-false}"

          cd ~/matchup

          if sudo docker compose version >/dev/null 2>&1; then
            COMPOSE="sudo docker compose"
          elif sudo docker-compose version >/dev/null 2>&1; then
            COMPOSE="sudo docker-compose"
          else
            echo "Docker Compose is not installed on the EC2 host"
            exit 1
          fi

          # ── Pre-build disk cleanup ────────────────────────────────────────
          # Prevent ERR_PNPM_ENOSPC during the docker build step by evicting
          # dangling images, stopped containers, and unused build cache.
          # Volumes are NOT touched (postgres/redis data must persist).
          echo "[cleanup] Disk usage before prune:"
          df -h / | tail -1
          sudo docker image prune -a -f || true
          sudo docker container prune -f || true
          sudo docker builder prune -a -f || true
          sudo docker network prune -f || true
          echo "[cleanup] Disk usage after prune:"
          df -h / | tail -1

          sudo docker build -f deploy/Dockerfile.api -t matchup-api .
          sudo docker build -f deploy/Dockerfile.web -t matchup-web .

          # ── Run database migrations before bringing up the new containers ──
          # Explicit deploy step — migrations must succeed before the API
          # starts. Failure aborts the deploy entirely (set -euo pipefail).
          # Rollback: re-deploy a previous image tag or run
          #   docker run --rm matchup-api npx prisma migrate resolve --rolled-back <migration>
          echo "[INFO] Running database migrations..."
          ${COMPOSE} -f deploy/docker-compose.prod.yml --env-file deploy/.env \
            run --rm --no-deps -T api npx prisma migrate deploy </dev/null

          cd deploy
          ${COMPOSE} -f docker-compose.prod.yml --env-file .env down
          ${COMPOSE} -f docker-compose.prod.yml --env-file .env up -d

          # Wait for matchup_api to become healthy (node process must be up).
          echo "[INFO] Waiting for matchup_api to start..."
          for i in $(seq 1 30); do
            if sudo docker exec matchup_api sh -c "pidof node >/dev/null 2>&1"; then
              echo "[INFO] matchup_api is running (attempt $i)"
              break
            fi
            sleep 2
          done

          if [ "${RESET_DB}" = "true" ]; then
            echo "[DANGER] Resetting database..."
            sudo docker exec matchup_api npx prisma migrate reset --force --skip-seed
            sudo docker exec matchup_api npx prisma db seed
          elif [ "${RUN_SEED}" = "true" ]; then
            echo "[DANGER] Running destructive full seed..."
            sudo docker exec matchup_api npx prisma db seed
          fi

          echo "[INFO] Syncing DB-backed image data..."
          # ts-node is a devDependency and not present in the production image.
          # Failure is surfaced as a GitHub Actions warning so operators are
          # notified; it does NOT abort the deploy (image sync is non-critical).
          if ! sudo docker exec matchup_api npx ts-node prisma/seed-images.ts; then
            echo "::warning::seed-images sync failed — image data may be stale. Re-run manually: docker exec matchup_api npx ts-node prisma/seed-images.ts"
          fi

          sudo docker exec matchup_nginx nginx -s reload

          # ── Post-deploy cleanup ───────────────────────────────────────────
          # Reclaim space from the images and build cache replaced by this run.
          sudo docker image prune -a -f || true
          sudo docker builder prune -a -f || true
          echo "[cleanup] Final disk usage:"
          df -h / | tail -1
          EOF

      - name: Health check
        run: |
          sleep 10
          ssh ec2 'curl -sf http://localhost > /dev/null && curl -fsS http://localhost/api/v1/health | jq -e ".data.checks.db == true and .data.checks.redis == true" > /dev/null && echo "Deploy OK" || (echo "Deploy FAILED"; exit 1)'
