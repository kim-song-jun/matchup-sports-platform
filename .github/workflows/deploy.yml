name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reset_db:
        description: 'DANGER: Drop all tables, re-run migrations, re-seed'
        required: false
        default: false
        type: boolean
      run_seed:
        description: 'DANGER: Run destructive full seed data refresh'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── Test job: runs on every push and PR ─────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: matchup_test
          POSTGRES_PASSWORD: matchup_test
          POSTGRES_DB: matchup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U matchup_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://matchup_test:matchup_test@localhost:5432/matchup_test
      JWT_SECRET: ci-test-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd apps/api && pnpm prisma generate

      - name: Lint (all packages)
        run: pnpm lint

      - name: Type-check (parallel)
        run: |
          (cd apps/api && npx tsc --noEmit) & pid1=$!
          (cd apps/web && npx tsc --noEmit) & pid2=$!
          wait $pid1 || exit 1
          wait $pid2 || exit 1

      - name: Unit tests (parallel)
        run: |
          pnpm --filter api test & pid1=$!
          pnpm --filter web test & pid2=$!
          wait $pid1 || exit 1
          wait $pid2 || exit 1

      - name: Prisma DB push (integration test schema)
        run: cd apps/api && pnpm prisma db push

      - name: Integration tests
        run: pnpm --filter api test:integration

  # ── Deploy job: runs on push to main or manual dispatch, after tests pass ──
  deploy:
    name: Deploy
    needs: test
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 400 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host ec2
            HostName ${{ secrets.EC2_HOST }}
            User ec2-user
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Sync code
        run: |
          rsync -avz --delete \
            --exclude node_modules --exclude .next --exclude dist --exclude .git --exclude 'deploy/certbot' \
            --filter 'protect deploy/.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ec2-user@${{ secrets.EC2_HOST }}:~/matchup/

      - name: Build and deploy
        timeout-minutes: 20
        env:
          RESET_DB: ${{ inputs.reset_db }}
          RUN_SEED: ${{ inputs.run_seed }}
          TOSS_CLIENT_KEY_SECRET: ${{ secrets.TOSS_CLIENT_KEY }}
          TOSS_SECRET_KEY_SECRET: ${{ secrets.TOSS_SECRET_KEY }}
          TOSS_WEBHOOK_SECRET_SECRET: ${{ secrets.TOSS_WEBHOOK_SECRET }}
        run: |
          TOSS_CLIENT_KEY_B64="$(printf '%s' "${TOSS_CLIENT_KEY_SECRET:-}" | base64 | tr -d '\n')"
          TOSS_SECRET_KEY_B64="$(printf '%s' "${TOSS_SECRET_KEY_SECRET:-}" | base64 | tr -d '\n')"
          TOSS_WEBHOOK_SECRET_B64="$(printf '%s' "${TOSS_WEBHOOK_SECRET_SECRET:-}" | base64 | tr -d '\n')"

          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 ec2 "RESET_DB='${RESET_DB:-}' RUN_SEED='${RUN_SEED:-}' TOSS_CLIENT_KEY_B64='${TOSS_CLIENT_KEY_B64}' TOSS_SECRET_KEY_B64='${TOSS_SECRET_KEY_B64}' TOSS_WEBHOOK_SECRET_B64='${TOSS_WEBHOOK_SECRET_B64}' bash -se" <<'EOF'
          set -euo pipefail

          RESET_DB="${RESET_DB:-false}"
          RUN_SEED="${RUN_SEED:-false}"

          cd ~/matchup

          sync_env_from_github_secret() {
            local key="$1"
            local b64_value="$2"
            local decoded_value=""
            local tmp_env

            if [ -n "$b64_value" ]; then
              decoded_value=$(printf '%s' "$b64_value" | base64 -d)
            fi

            tmp_env=$(mktemp)
            awk -v key="${key}=" 'index($0, key) != 1' deploy/.env > "$tmp_env"
            {
              cat "$tmp_env"
              printf '%s=%s\n' "$key" "$decoded_value"
            } > deploy/.env
            rm -f "$tmp_env"
          }

          if sudo docker compose version >/dev/null 2>&1; then
            COMPOSE="sudo docker compose"
          elif sudo docker-compose version >/dev/null 2>&1; then
            COMPOSE="sudo docker-compose"
          else
            echo "Docker Compose is not installed on the EC2 host"
            exit 1
          fi

          if ! command -v jq >/dev/null 2>&1; then
            sudo yum install -y jq 2>/dev/null || sudo apt-get install -y jq 2>/dev/null || {
              echo "[ERROR] jq is required for deploy health checks"
              exit 1
            }
          fi

          if [ ! -f deploy/.env ]; then
            echo "[ERROR] Missing deploy/.env on the EC2 host"
            exit 1
          fi

          sync_env_from_github_secret "TOSS_CLIENT_KEY" "${TOSS_CLIENT_KEY_B64:-}"
          sync_env_from_github_secret "TOSS_SECRET_KEY" "${TOSS_SECRET_KEY_B64:-}"
          sync_env_from_github_secret "TOSS_WEBHOOK_SECRET" "${TOSS_WEBHOOK_SECRET_B64:-}"

          set -a
          . deploy/.env
          set +a

          required_env_vars=(DB_PASSWORD JWT_SECRET)
          for required_env in "${required_env_vars[@]}"; do
            if [ -z "${!required_env:-}" ]; then
              echo "[ERROR] Missing required deploy env: ${required_env}"
              exit 1
            fi
          done

          WEB_INTERNAL_API_ORIGIN="${INTERNAL_API_ORIGIN:-http://api:8100}"

          # ── Pre-build disk cleanup ────────────────────────────────────────
          # Prevent ERR_PNPM_ENOSPC during the docker build step by evicting
          # dangling images, stopped containers, and unused build cache.
          # Volumes are NOT touched (postgres/redis data must persist).
          echo "[cleanup] Disk usage before prune:"
          df -h / | tail -1
          # Use `docker image prune -f` (without -a) to remove only dangling images.
          # `-a` would delete ALL unused images including cached base layers (node:22-alpine,
          # postgres:16-alpine, etc.) forcing a full re-pull on every deploy.
          sudo docker image prune -f || true
          sudo docker container prune -f || true
          sudo docker builder prune -a -f || true
          sudo docker network prune -f || true
          echo "[cleanup] Disk usage after prune:"
          df -h / | tail -1

          sudo docker build --no-cache -f deploy/Dockerfile.api -t matchup-api .
          sudo docker build --no-cache \
            -f deploy/Dockerfile.web \
            --build-arg NEXT_PUBLIC_API_URL=/api/v1 \
            --build-arg NEXT_PUBLIC_TOSS_CLIENT_KEY="${TOSS_CLIENT_KEY:-}" \
            --build-arg INTERNAL_API_ORIGIN="${WEB_INTERNAL_API_ORIGIN}" \
            -t matchup-web .

          cd deploy

          # ── Ensure postgres and redis are running before migrations ───────
          # network prune above may have removed the deploy_default network.
          # Start DB services first so the migration container can reach them.
          echo "[INFO] Starting database services..."
          ${COMPOSE} -f docker-compose.prod.yml --env-file .env up -d postgres redis

          echo "[INFO] Waiting for postgres to be healthy..."
          for i in $(seq 1 30); do
            if ${COMPOSE} -f docker-compose.prod.yml --env-file .env exec -T postgres \
                pg_isready >/dev/null 2>&1; then
              echo "[INFO] postgres is ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "[ERROR] postgres did not become healthy in time"
              exit 1
            fi
            sleep 2
          done

          # ── Bootstrap or apply database migrations before new containers ──
          # Empty databases cannot replay the current migration chain from
          # scratch because the repo lacks an old baseline migration. In that
          # case we bootstrap the current schema with prisma db push and mark
          # the existing migrations as applied. Non-empty databases still use
          # migrate deploy, and a non-empty DB without migration history fails
          # closed instead of auto-resolving unknown drift.
          echo "[INFO] Bootstrapping deploy database..."
          ${COMPOSE} -f docker-compose.prod.yml --env-file .env \
            run --rm --no-deps -T api npx ts-node prisma/bootstrap-deploy-db.ts || true
          echo "[INFO] Build phase complete."
          EOF

      - name: Restart containers
        timeout-minutes: 10
        env:
          RESET_DB: ${{ inputs.reset_db }}
          RUN_SEED: ${{ inputs.run_seed }}
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 ec2 bash -se <<'EOF'
          set -euo pipefail
          cd ~/matchup/deploy

          set -a
          . .env
          set +a

          if sudo docker compose version >/dev/null 2>&1; then
            COMPOSE="sudo docker compose"
          else
            COMPOSE="sudo docker-compose"
          fi

          echo "[INFO] Stopping all containers..."
          ${COMPOSE} -f docker-compose.prod.yml --env-file .env down --remove-orphans || true

          echo "[INFO] Starting DB services first..."
          ${COMPOSE} -f docker-compose.prod.yml --env-file .env up -d postgres redis

          echo "[INFO] Waiting for postgres healthy..."
          for i in $(seq 1 30); do
            if ${COMPOSE} -f docker-compose.prod.yml --env-file .env exec -T postgres pg_isready >/dev/null 2>&1; then
              echo "[INFO] postgres ready (attempt $i)"
              break
            fi
            sleep 2
          done

          echo "[INFO] Starting all services..."
          ${COMPOSE} -f docker-compose.prod.yml --env-file .env up -d --force-recreate

          echo "[INFO] Waiting for matchup_api health..."
          for i in $(seq 1 45); do
            if curl -fsS http://localhost:8100/api/v1/health | \
                jq -e '.data.checks.db == true and .data.checks.redis == true' >/dev/null 2>&1; then
              echo "[INFO] matchup_api is healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 45 ]; then
              echo "[ERROR] matchup_api failed health check after 90s"
              echo "[DEBUG] API container status:"
              sudo docker ps -a --filter name=matchup_api --format 'table {{.Status}}\t{{.Ports}}' || true
              echo "[DEBUG] API logs (last 60 lines):"
              sudo docker logs matchup_api --tail 60 2>&1 || true
              echo "[DEBUG] Attempting restart..."
              sudo docker restart matchup_api || true
              sleep 10
              if curl -fsS http://localhost:8100/api/v1/health >/dev/null 2>&1; then
                echo "[INFO] matchup_api recovered after restart"
              else
                echo "[ERROR] matchup_api still unhealthy — continuing anyway"
              fi
              break
            fi
            sleep 2
          done

          echo "[INFO] Waiting for matchup_web routing..."
          for i in $(seq 1 45); do
            if curl -fsS http://localhost:3000/api/v1/health | \
                jq -e '.data.checks.db == true and .data.checks.redis == true' >/dev/null 2>&1 && \
               curl -fsS http://localhost:3000/landing >/dev/null 2>&1; then
              echo "[INFO] matchup_web routing is healthy (attempt $i)"
              break
            fi
            if [ "$i" -eq 45 ]; then
              echo "[ERROR] matchup_web failed routing check"
              sudo docker logs matchup_web --tail 120 || true
              exit 1
            fi
            sleep 2
          done

          RESET_DB="${RESET_DB:-false}"
          RUN_SEED="${RUN_SEED:-false}"

          if [ "${RESET_DB}" = "true" ]; then
            echo "[DANGER] Resetting database..."
            sudo docker exec matchup_api npx prisma migrate reset --force --skip-seed
            sudo docker exec matchup_api npx prisma db seed
          elif [ "${RUN_SEED}" = "true" ]; then
            echo "[DANGER] Running destructive full seed..."
            sudo docker exec matchup_api npx prisma db seed
          fi

          echo "[INFO] Syncing canonical mock data..."
          sudo docker exec matchup_api npx ts-node prisma/seed-mocks.ts --checksum-gate || true

          echo "[INFO] Syncing DB-backed image data..."
          sudo docker exec matchup_api npx ts-node prisma/seed-images.ts || echo "::warning::seed-images sync failed"

          sudo rm -rf /var/cache/nginx/* 2>/dev/null || true
          sudo docker exec matchup_nginx nginx -t
          sudo docker exec matchup_nginx nginx -s reload

          sudo docker image prune -a -f || true
          sudo docker builder prune -a -f || true
          echo "[cleanup] Final disk usage:"
          df -h / | tail -1
          echo "[INFO] Deploy complete."
          EOF

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            if ssh ec2 'curl -fsS http://localhost:8100/api/v1/health | \
                        jq -e ".data.checks.db == true and .data.checks.redis == true" > /dev/null 2>&1 && \
                        curl -fsS http://localhost/landing > /dev/null 2>&1 && \
                        curl -fsS http://localhost/api/v1/health | \
                        jq -e ".data.checks.db == true and .data.checks.redis == true" > /dev/null 2>&1'; then
              echo "Deploy OK"
              exit 0
            fi
            echo "Attempt $i/12 — not ready yet, retrying in 10s..."
            sleep 10
          done
          echo "Deploy FAILED"
          exit 1
