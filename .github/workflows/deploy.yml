name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web test
      - run: cd apps/api && npx jest --config jest.config.ts

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 400 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host ec2
            HostName ${{ secrets.EC2_HOST }}
            User ec2-user
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Sync code
        run: |
          rsync -avz --delete \
            --exclude node_modules --exclude .next --exclude dist --exclude .git \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ec2-user@${{ secrets.EC2_HOST }}:~/matchup/

      - name: Build and deploy
        run: |
          ssh ec2 'cd ~/matchup && sudo docker build --no-cache -f deploy/Dockerfile.api -t matchup-api . && sudo docker build --no-cache -f deploy/Dockerfile.web -t matchup-web . && cd deploy && sudo docker-compose -f docker-compose.prod.yml --env-file .env down && sudo docker-compose -f docker-compose.prod.yml --env-file .env up -d && sleep 10 && sudo docker exec matchup_api npx prisma db push --accept-data-loss && sudo docker image prune -f'

      - name: Health check
        run: |
          sleep 10
          ssh ec2 'curl -sf http://localhost > /dev/null && echo "Deploy OK" || echo "Deploy FAILED"'
