name: CI / Deploy

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# PR 간 상호 취소 방지: 그룹을 PR/ref 단위로 분리
# - pull_request: 같은 PR의 이전 attempt만 취소 (ci-pr-N)
# - main push · workflow_dispatch: 취소 없이 직렬 큐
# 프로덕션 배포 직렬화는 deploy job의 job-level concurrency가 담당
concurrency:
  group: ci-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Test job: runs on every push and PR ─────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: teameet_test
          POSTGRES_PASSWORD: teameet_test
          POSTGRES_DB: teameet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U teameet_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://teameet_test:teameet_test@localhost:5432/teameet_test
      JWT_SECRET: ci-test-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: V1 DB guardrails
        run: pnpm qa:v1-db-guardrails

      - name: Generate Prisma client
        run: cd apps/api && pnpm prisma generate

      - name: Lint (all packages)
        run: pnpm lint

      - name: Type-check (parallel)
        run: |
          (cd apps/api && npx tsc --noEmit) & pid1=$!
          (cd apps/web && npx tsc --noEmit) & pid2=$!
          wait $pid1 || exit 1
          wait $pid2 || exit 1

      - name: Unit tests (parallel)
        run: |
          pnpm --filter api test & pid1=$!
          pnpm --filter web test & pid2=$!
          wait $pid1 || exit 1
          wait $pid2 || exit 1

      - name: Prisma DB push (integration test schema)
        run: cd apps/api && pnpm prisma db push

      - name: Integration tests
        run: pnpm --filter api test:integration

      - name: Generate V1 Prisma client
        run: cd apps/v1_api && pnpm prisma generate

      # 마이그레이션 게이트: 빈 DB에 전체 체인 재생 + schema.prisma 드리프트 0 검증.
      # db push로만 스키마를 바꾸면 여기서 CI가 깨진다 — 반드시 migration 파일 동반.
      # (2026-07-12 프로덕션 장애 재발 방지: 리뷰 테이블 migration 누락 → deploy 중단)
      - name: V1 migration replay + drift gate
        env:
          PGPASSWORD: teameet_test
          MIGRATE_URL: postgresql://teameet_test:teameet_test@localhost:5432/v1_migrate_check
        run: |
          psql -h localhost -U teameet_test -d teameet_test -c "CREATE DATABASE v1_migrate_check;"
          cd apps/v1_api
          DATABASE_URL="$MIGRATE_URL" ./node_modules/.bin/prisma migrate deploy
          ./node_modules/.bin/prisma migrate diff \
            --from-url "$MIGRATE_URL" --to-schema-datamodel prisma/schema.prisma --exit-code
          DATABASE_URL="$MIGRATE_URL" pnpm test:integration
          echo "migration chain OK — empty-DB replay clean, zero schema drift"

      - name: V1 unit tests (parallel)
        run: |
          pnpm --filter v1_api test & pid1=$!
          pnpm --filter v1_web test & pid2=$!
          wait $pid1 || exit 1
          wait $pid2 || exit 1

      # Next.js 빌드 캐시 — build check를 가볍게 (incremental compile 재사용)
      - name: Cache Next.js build cache (v1_web)
        uses: actions/cache@v4
        with:
          path: apps/v1_web/.next/cache
          key: nextjs-v1web-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nextjs-v1web-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: V1 build checks (parallel)
        run: |
          pnpm --filter v1_api build & pid1=$!
          pnpm --filter v1_web build & pid2=$!
          wait $pid1 || exit 1
          wait $pid2 || exit 1

  # ── Deploy job: runs on push to main or manual dispatch, after tests pass ──
  deploy:
    name: Deploy
    needs: test
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # 수동 승인 게이트: production environment의 required reviewer가
    # GitHub UI에서 승인해야 배포가 시작된다 (main push 자동 배포 제거)
    environment: production
    # 프로덕션 배포 직렬화: 진행 중 배포는 취소하지 않고 뒤에 큐잉
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 400 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host ec2
            HostName ${{ secrets.EC2_HOST }}
            User ec2-user
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Sync code
        run: |
          rsync -avz --delete \
            --exclude node_modules --exclude .next --exclude dist --exclude .git --exclude 'deploy/certbot' \
            --filter 'protect deploy/.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ec2-user@${{ secrets.EC2_HOST }}:~/teameet/

      - name: Build and deploy
        timeout-minutes: 35
        env:
          KAKAO_CLIENT_ID_SECRET: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REDIRECT_URI_SECRET: ${{ secrets.KAKAO_REDIRECT_URI }}
          V1_HOST_ADMIN_PASSWORD_SECRET: ${{ secrets.V1_HOST_ADMIN_PASSWORD }}
        run: |
          KAKAO_CLIENT_ID_B64="$(printf '%s' "${KAKAO_CLIENT_ID_SECRET:-}" | base64 | tr -d '\n')"
          KAKAO_CLIENT_SECRET_B64="$(printf '%s' "${KAKAO_CLIENT_SECRET_SECRET:-}" | base64 | tr -d '\n')"
          KAKAO_REDIRECT_URI_B64="$(printf '%s' "${KAKAO_REDIRECT_URI_SECRET:-}" | base64 | tr -d '\n')"
          V1_HOST_ADMIN_PASSWORD_B64="$(printf '%s' "${V1_HOST_ADMIN_PASSWORD_SECRET:-}" | base64 | tr -d '\n')"

          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 ec2 "KAKAO_CLIENT_ID_B64='${KAKAO_CLIENT_ID_B64}' KAKAO_CLIENT_SECRET_B64='${KAKAO_CLIENT_SECRET_B64}' KAKAO_REDIRECT_URI_B64='${KAKAO_REDIRECT_URI_B64}' V1_HOST_ADMIN_PASSWORD_B64='${V1_HOST_ADMIN_PASSWORD_B64}' bash -se" <<'EOF'
          set -euo pipefail

          cd ~/teameet

          sync_env_from_github_secret() {
            local key="$1"
            local b64_value="$2"
            local decoded_value=""
            local tmp_env

            if [ -n "$b64_value" ]; then
              decoded_value=$(printf '%s' "$b64_value" | base64 -d)
            fi

            tmp_env=$(mktemp)
            awk -v key="${key}=" 'index($0, key) != 1' deploy/.env > "$tmp_env"
            {
              cat "$tmp_env"
              printf '%s=%s\n' "$key" "$decoded_value"
            } > deploy/.env
            rm -f "$tmp_env"
          }

          if sudo docker compose version >/dev/null 2>&1; then
            COMPOSE="sudo docker compose"
          elif sudo docker-compose version >/dev/null 2>&1; then
            COMPOSE="sudo docker-compose"
          else
            echo "Docker Compose is not installed on the EC2 host"
            exit 1
          fi

          if ! command -v jq >/dev/null 2>&1; then
            sudo yum install -y jq 2>/dev/null || sudo apt-get install -y jq 2>/dev/null || {
              echo "[ERROR] jq is required for deploy health checks"
              exit 1
            }
          fi

          if [ ! -f deploy/.env ]; then
            echo "[ERROR] Missing deploy/.env on the EC2 host"
            exit 1
          fi

          sync_env_from_github_secret "KAKAO_CLIENT_ID" "${KAKAO_CLIENT_ID_B64:-}"
          sync_env_from_github_secret "KAKAO_CLIENT_SECRET" "${KAKAO_CLIENT_SECRET_B64:-}"
          sync_env_from_github_secret "KAKAO_REDIRECT_URI" "${KAKAO_REDIRECT_URI_B64:-}"
          sync_env_from_github_secret "V1_HOST_ADMIN_PASSWORD" "${V1_HOST_ADMIN_PASSWORD_B64:-}"

          # Harden deploy/.env perms against EC2 umask 022 — contains DB_PASSWORD/JWT_SECRET and other secrets
          chmod 600 deploy/.env

          set -a
          . deploy/.env
          set +a

          required_env_vars=(DB_PASSWORD JWT_SECRET)
          for required_env in "${required_env_vars[@]}"; do
            if [ -z "${!required_env:-}" ]; then
              echo "[ERROR] Missing required deploy env: ${required_env}"
              exit 1
            fi
          done

          V1_WEB_INTERNAL_API_ORIGIN="${V1_INTERNAL_API_ORIGIN:-http://v1_api:8121}"

          # ── Pre-build disk cleanup ────────────────────────────────────────
          # Prevent ERR_PNPM_ENOSPC during the docker build step by evicting
          # dangling images, stopped containers, and unused build cache.
          # Volumes are NOT touched (v1_postgres data must persist).
          echo "[cleanup] Disk usage before prune:"
          df -h / | tail -1
          # Use `docker image prune -f` (without -a) to remove only dangling images.
          # `-a` would delete ALL unused images including cached base layers (node:22-alpine,
          # postgres:16-alpine, etc.) forcing a full re-pull on every deploy.
          sudo docker image prune -f || true
          sudo docker container prune -f || true
          sudo docker builder prune -a -f || true
          sudo docker network prune -f || true
          echo "[cleanup] Disk usage after prune:"
          df -h / | tail -1

          sudo docker build --no-cache -f deploy/Dockerfile.v1-api -t teameet-v1-api .
          sudo docker build --no-cache \
            -f deploy/Dockerfile.v1-web \
            --build-arg NEXT_PUBLIC_API_URL=/v1/api/v1 \
            --build-arg INTERNAL_API_ORIGIN="${V1_WEB_INTERNAL_API_ORIGIN}" \
            --build-arg NEXT_PUBLIC_BASE_PATH=/v1 \
            --build-arg NEXT_PUBLIC_KAKAO_CLIENT_ID="${KAKAO_CLIENT_ID:-}" \
            --build-arg NEXT_PUBLIC_KAKAO_REDIRECT_URI="${KAKAO_REDIRECT_URI:-}" \
            -t teameet-v1-web .

          cd deploy

          # ── Ensure v1_postgres is running before migrations ────────────────
          # network prune above may have removed the deploy_default network.
          # Start the DB service first so the migration container can reach it.
          echo "[INFO] Starting database services..."
          ${COMPOSE} -f docker-compose.prod.yml --env-file .env up -d v1_postgres

          echo "[INFO] Waiting for v1_postgres to be healthy..."
          for i in $(seq 1 30); do
            if ${COMPOSE} -f docker-compose.prod.yml --env-file .env exec -T v1_postgres \
                pg_isready -U "${V1_DB_USER:-teameet_v1}" -d "${V1_DB_NAME:-teameet_v1}" >/dev/null 2>&1; then
              echo "[INFO] v1_postgres is ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "[ERROR] v1_postgres did not become healthy in time"
              exit 1
            fi
            sleep 2
          done

          echo "[INFO] Syncing v1 deploy database schema..."
          ${COMPOSE} -f docker-compose.prod.yml --env-file .env \
            run --rm --no-deps -T v1_api sh -c "cd /app/apps/v1_api && ./node_modules/.bin/prisma migrate deploy"
          echo "[INFO] Build phase complete."
          EOF

      - name: Restart containers
        timeout-minutes: 15
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 ec2 \
            "bash ~/teameet/deploy/restart-containers.sh"

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            if ssh ec2 'curl -fsS --connect-timeout 5 --max-time 15 http://localhost:8121/api/v1/health | \
                        jq -e ".data.checks.db == true" > /dev/null 2>&1 && \
                        curl -fsS --connect-timeout 5 --max-time 15 --resolve teameet.co.kr:443:127.0.0.1 -o /dev/null -w "%{http_code}" https://teameet.co.kr/v1/landing 2>/dev/null | \
                        grep -qx 200 && \
                        curl -sSI --connect-timeout 5 --max-time 15 --resolve teameet.co.kr:443:127.0.0.1 -o /dev/null -w "%{http_code}" https://teameet.co.kr/ 2>/dev/null | \
                        grep -qx 308 && \
                        curl -sSI --connect-timeout 5 --max-time 15 --resolve teameet.co.kr:443:127.0.0.1 -o /dev/null -w "%{http_code}" https://teameet.co.kr/api/v1/health 2>/dev/null | \
                        grep -qx 308'; then
              echo "Deploy OK"
              exit 0
            fi
            echo "Attempt $i/12 — not ready yet, retrying in 10s..."
            sleep 10
          done
          echo "Deploy FAILED"
          exit 1
