# 구(legacy) 루트 스택(postgres/redis/api/web)은 2026-07 아카이빙됨.
# nginx가 루트 경로를 전부 /v1으로 301 얼라이어스하므로 v1 스택만 기동한다.
# 구 스택 데이터 볼륨(postgres_data, uploads_data)은 도커 호스트에 그대로 남아 있다
# (compose 정의에서 제외했으므로 `down -v`로도 삭제되지 않음 — 복구 시 수동 재연결).
services:
  v1_postgres:
    image: postgres:16-alpine
    container_name: teameet_v1_postgres
    restart: always
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c max_connections=100
      -c work_mem=4MB
    environment:
      POSTGRES_USER: ${V1_DB_USER:-teameet_v1}
      POSTGRES_PASSWORD: ${V1_DB_PASSWORD:-${DB_PASSWORD}}
      POSTGRES_DB: ${V1_DB_NAME:-teameet_v1}
    volumes:
      - v1_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${V1_DB_USER:-teameet_v1} -d ${V1_DB_NAME:-teameet_v1}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  v1_api:
    image: teameet-v1-api:latest
    container_name: teameet_v1_api
    restart: always
    volumes:
      - v1_uploads_data:/app/apps/v1_api/uploads
    environment:
      DATABASE_URL: postgresql://${V1_DB_USER:-teameet_v1}:${V1_DB_PASSWORD:-${DB_PASSWORD}}@v1_postgres:5432/${V1_DB_NAME:-teameet_v1}
      JWT_SECRET: ${V1_JWT_SECRET:-${JWT_SECRET}}
      V1_HOST_ADMIN_PASSWORD: ${V1_HOST_ADMIN_PASSWORD:-}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI:-}
      API_PORT: 8121
      NODE_ENV: production
      V1_ALLOW_HEADER_AUTH: ${V1_ALLOW_HEADER_AUTH:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8121/api/v1/health').then(async (res) => { if (!res.ok) throw new Error('v1 api health ' + res.status); const json = await res.json(); if (!json?.data?.checks?.db) throw new Error('v1 api health degraded'); }).catch(() => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      v1_postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8121:8121"
    deploy:
      resources:
        limits:
          memory: 512M

  v1_web:
    image: teameet-v1-web:latest
    container_name: teameet_v1_web
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: /v1/api/v1
      NEXT_PUBLIC_BASE_PATH: /v1
      NEXT_PUBLIC_KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      NEXT_PUBLIC_KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI:-}
      INTERNAL_API_ORIGIN: ${V1_INTERNAL_API_ORIGIN:-http://v1_api:8121}
      HOSTNAME: 0.0.0.0
      PORT: 3013
      NODE_ENV: production
    depends_on:
      v1_api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3013/v1/landing').then((res) => { if (!res.ok) throw new Error('v1 web health ' + res.status); }).catch(() => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "127.0.0.1:3013:3013"
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: teameet_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      v1_web:
        condition: service_healthy
      v1_api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  v1_postgres_data:
  v1_uploads_data:
