version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: matchup_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-matchup}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-matchup}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-matchup}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: matchup_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: matchup-api:latest
    container_name: matchup_api
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-matchup}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-matchup}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: 8100
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8100:8100"

  web:
    image: matchup-web:latest
    container_name: matchup_web
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8100/api/v1}
      NODE_ENV: production
    depends_on:
      - api
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: matchup_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:
