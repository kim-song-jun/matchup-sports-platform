server_tokens off;

upstream v1_web {
    server v1_web:3013;
}

upstream v1_api {
    server v1_api:8121;
}

limit_req_zone $binary_remote_addr zone=uploads:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=v1api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=v1auth:10m rate=10r/m;

server {
    listen 80;
    server_name alpha.teameet.co.kr;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://alpha.teameet.co.kr$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name alpha.teameet.co.kr;

    ssl_certificate /etc/letsencrypt/live/alpha.teameet.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alpha.teameet.co.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:alpha_tls:10m;
    ssl_session_timeout 1d;

    client_max_body_size 55m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1000;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ^~ /api/v1/auth/ {
        include /etc/nginx/snippets/teameet-security-headers.conf;
        include /etc/nginx/snippets/teameet-proxy-hide-security-headers.conf;
        include /etc/nginx/snippets/teameet-release-metadata.conf;
        limit_req zone=v1auth burst=5 nodelay;
        proxy_pass http://v1_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-V1-User-Id "";
        proxy_set_header X-V1-User-Email "";
        proxy_set_header Authorization "";
        add_header Cache-Control "no-store" always;
    }

    location ^~ /api/v1/ {
        include /etc/nginx/snippets/teameet-security-headers.conf;
        include /etc/nginx/snippets/teameet-proxy-hide-security-headers.conf;
        include /etc/nginx/snippets/teameet-release-metadata.conf;
        limit_req zone=v1api burst=20 nodelay;
        proxy_pass http://v1_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-V1-User-Id "";
        proxy_set_header X-V1-User-Email "";
        proxy_set_header Authorization "";
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "no-store" always;
    }

    location ^~ /_next/static/ {
        include /etc/nginx/snippets/teameet-security-headers.conf;
        include /etc/nginx/snippets/teameet-proxy-hide-security-headers.conf;
        include /etc/nginx/snippets/teameet-release-metadata.conf;
        proxy_pass http://v1_web;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "";
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /uploads/ {
        include /etc/nginx/snippets/teameet-security-headers.conf;
        include /etc/nginx/snippets/teameet-proxy-hide-security-headers.conf;
        include /etc/nginx/snippets/teameet-release-metadata.conf;
        limit_req zone=uploads burst=5 nodelay;
        proxy_pass http://v1_api/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "";
        add_header Cache-Control "private, no-store" always;
    }

    location / {
        include /etc/nginx/snippets/teameet-security-headers.conf;
        include /etc/nginx/snippets/teameet-proxy-hide-security-headers.conf;
        include /etc/nginx/snippets/teameet-release-metadata.conf;
        proxy_pass http://v1_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Authorization "";
        proxy_cache_bypass $http_upgrade;
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }
}
