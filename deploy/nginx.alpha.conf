server_tokens off;

upstream v1_web {
    server v1_web:3013;
}

upstream v1_api {
    server v1_api:8121;
}

# uploads zone: 이미 저장된 이미지를 보여주는 GET /uploads/* 전용(정적 파일 서빙, 업로드
# 생성 POST /api/v1/uploads는 인증 필요 + 아래 v1api zone을 탄다 — 별개).
# 팀/대회/장터 등 목록·갤러리 화면은 한 번에 수십 장의 썸네일을 동시에 요청하므로
# API 호출(v1api)보다 여유 있게 잡는다. 기존 rate=10r/m·burst=5는 팀 목록(최대 20개
# 로고)조차 못 버텨 6번째 이미지부터 즉시 503 — 목록에서 예산을 다 쓰면 곧이어 연 상세
# 페이지의 이미지도 같은 1분 창 안에서 rate limit에 걸렸다.
limit_req_zone $binary_remote_addr zone=uploads:10m rate=300r/m;
limit_req_zone $binary_remote_addr zone=v1api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=v1auth:10m rate=10r/m;

server {
    listen 80;
    server_name alpha.teameet.co.kr;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://alpha.teameet.co.kr$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name alpha.teameet.co.kr;

    ssl_certificate /etc/letsencrypt/live/alpha.teameet.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alpha.teameet.co.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:alpha_tls:10m;
    ssl_session_timeout 1d;

    client_max_body_size 55m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1000;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ^~ /api/v1/auth/ {
        include /etc/nginx/snippets/teameet-security-headers.conf;
        include /etc/nginx/snippets/teameet-proxy-hide-security-headers.conf;
        include /etc/nginx/snippets/teameet-release-metadata.conf;
        limit_req zone=v1auth burst=5 nodelay;
        proxy_pass http://v1_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # v1 인증은 x-v1-user-id/x-v1-user-email 헤더 신뢰 방식이다(서명 세션 아님, 의도적 dev/alpha 전용
        # 위험 수용 — apps/v1_api/src/main.ts의 V1_ALLOW_HEADER_AUTH fail-closed 게이트로 프로덕션 부팅 시
        # 명시 opt-in 필요). 여기서 헤더를 비우면 GET /auth/me 를 포함해 이 prefix의 모든 인증 요청이
        # 항상 401이 된다 — 스푸핑 방지 의도였다면 게이트가 이미 그 리스크를 감수하기로 결정한 뒤이므로
        # 이 위치에서 다시 막는 건 알파를 통째로 인증 불능으로 만들 뿐 추가 보안 이득이 없다.
        add_header Cache-Control "no-store" always;
    }

    location ^~ /api/v1/ {
        include /etc/nginx/snippets/teameet-security-headers.conf;
        include /etc/nginx/snippets/teameet-proxy-hide-security-headers.conf;
        include /etc/nginx/snippets/teameet-release-metadata.conf;
        limit_req zone=v1api burst=20 nodelay;
        proxy_pass http://v1_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # 위 /api/v1/auth/ 블록과 동일한 이유로 헤더를 그대로 통과시킨다 — 채팅/알림/매치 등
        # 이 prefix 아래 모든 인증 필요 엔드포인트가 x-v1-user-id/x-v1-user-email 신뢰 헤더로 동작한다.
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "no-store" always;
    }

    location ^~ /_next/static/ {
        include /etc/nginx/snippets/teameet-security-headers.conf;
        include /etc/nginx/snippets/teameet-proxy-hide-security-headers.conf;
        include /etc/nginx/snippets/teameet-release-metadata.conf;
        proxy_pass http://v1_web;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "";
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /uploads/ {
        include /etc/nginx/snippets/teameet-security-headers.conf;
        include /etc/nginx/snippets/teameet-proxy-hide-security-headers.conf;
        include /etc/nginx/snippets/teameet-release-metadata.conf;
        limit_req zone=uploads burst=60 nodelay;
        proxy_pass http://v1_api/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "";
        add_header Cache-Control "private, no-store" always;
    }

    location ^~ /admin-content-preview {
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; object-src 'none';" always;
        include /etc/nginx/snippets/teameet-proxy-hide-security-headers.conf;
        include /etc/nginx/snippets/teameet-release-metadata.conf;
        proxy_pass http://v1_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Authorization "";
        proxy_cache_bypass $http_upgrade;
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location / {
        include /etc/nginx/snippets/teameet-security-headers.conf;
        include /etc/nginx/snippets/teameet-proxy-hide-security-headers.conf;
        include /etc/nginx/snippets/teameet-release-metadata.conf;
        proxy_pass http://v1_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Authorization "";
        proxy_cache_bypass $http_upgrade;
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }
}
