upstream v1_web {
    server v1_web:3013;
}

upstream v1_api {
    server v1_api:8121;
}

limit_req_zone $binary_remote_addr zone=uploads:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=v1api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=v1auth:10m rate=10r/m;

server {
    listen 80;
    server_name teameet.co.kr www.teameet.co.kr;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name teameet.co.kr www.teameet.co.kr;

    ssl_certificate /etc/letsencrypt/live/teameet.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teameet.co.kr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";

    client_max_body_size 55m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1000;

    # ── 구(legacy) /v1 basePath 경로 — 브라우저 라우트 완전 제거 (2026-07) ──
    # basePath=/v1 시대의 브라우저 경로는 더 이상 유효하지 않습니다.
    # 북마크/외부 링크 등 기존 /v1/* URL은 404로 반환하며, 301 리다이렉트는 하지 않습니다.
    # (SEO 노출이 없었던 프리뷰 단계 URL이므로 영구 redirect 없음)
    # API 경로 (/api/v1/*)는 /v1 prefix 없이 /api/v1/* 로 직접 접근합니다.
    #
    # 예외: OAuth 콜백 경로는 외부 서비스(Kakao 등) redirect_uri로 등록된 URL이라
    # 카카오 개발자 콘솔을 업데이트하기 전까지 302로 포워딩합니다.
    # 운영자 조치: Kakao 개발자 콘솔 redirect_uri를 /v1/callback/kakao → /callback/kakao 로
    # 변경한 뒤 이 location 블록을 제거합니다.
    location = /v1/callback/kakao {
        return 302 /callback/kakao$is_args$args;
    }

    location = /v1 {
        return 404;
    }
    location ^~ /v1/ {
        return 404;
    }

    # ── API: /api/v1/auth/* — 인증 엔드포인트 (rate limit 강화) ──────────────
    location ^~ /api/v1/auth/ {
        limit_req zone=v1auth burst=5 nodelay;
        proxy_pass http://v1_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; object-src 'none';" always; # TODO: tighten with nonce-based CSP after staging verification
        add_header Cache-Control "no-store";
    }

    # ── API: /api/* — 일반 API 요청 ───────────────────────────────────────────
    location ^~ /api/ {
        limit_req zone=v1api burst=20 nodelay;
        proxy_pass http://v1_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; object-src 'none';" always; # TODO: tighten with nonce-based CSP after staging verification
        add_header Cache-Control "no-store";
    }

    # ── Next.js static 자산 (장기 캐시) ──────────────────────────────────────
    location ^~ /_next/static/ {
        proxy_pass http://v1_web;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; object-src 'none';" always; # TODO: tighten with nonce-based CSP after staging verification
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── 업로드 자산 (/uploads/*) ─────────────────────────────────────────────
    location ^~ /uploads/ {
        limit_req zone=uploads burst=5 nodelay;
        proxy_pass http://v1_api/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; object-src 'none';" always; # TODO: tighten with nonce-based CSP after staging verification
        add_header Cache-Control "public, max-age=3600";
    }

    # ── 브라우저 앱 — 모든 루트 경로 → Next.js ────────────────────────────────
    location / {
        proxy_pass http://v1_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        proxy_ignore_headers Cache-Control;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; object-src 'none';" always; # TODO: tighten with nonce-based CSP after staging verification
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }
}
