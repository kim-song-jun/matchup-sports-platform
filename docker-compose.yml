x-app-base: &app-base
  build:
    context: .
    dockerfile: deploy/Dockerfile.dev
  working_dir: /app
  volumes:
    - .:/app
    - type: volume
      source: root_node_modules_v3
      target: /app/node_modules
      volume:
        nocopy: true
    - type: volume
      source: api_node_modules_v3
      target: /app/apps/api/node_modules
      volume:
        nocopy: true
    - type: volume
      source: web_node_modules_v3
      target: /app/apps/web/node_modules
      volume:
        nocopy: true
  environment:
    TZ: Asia/Seoul

services:
  deps:
    <<: *app-base
    command: >
      sh -c "
      find /app/node_modules -mindepth 1 -maxdepth 1 -exec rm -rf {} +;
      find /app/apps/api/node_modules -mindepth 1 -maxdepth 1 -exec rm -rf {} +;
      find /app/apps/web/node_modules -mindepth 1 -maxdepth 1 -exec rm -rf {} +;
      cp -a /opt/deps/node_modules/. /app/node_modules/;
      cp -a /opt/deps/apps/api/node_modules/. /app/apps/api/node_modules/;
      cp -a /opt/deps/apps/web/node_modules/. /app/apps/web/node_modules/
      "

  postgres:
    image: postgres:16-alpine
    container_name: matchup_postgres_dev
    environment:
      POSTGRES_USER: matchup_user
      POSTGRES_PASSWORD: matchup_password
      POSTGRES_DB: matchup_dev
    # Internal Docker network only.
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matchup_user -d matchup_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: matchup_redis_dev
    # Internal Docker network only.
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    <<: *app-base
    container_name: matchup_api_dev
    command: sh -c "cd /app/apps/api && pnpm db:generate && pnpm dev"
    environment:
      TZ: Asia/Seoul
      DATABASE_URL: postgresql://matchup_user:matchup_password@postgres:5432/matchup_dev
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret
      API_PORT: 8111
      AUTH_HASH_DRIVER: bcryptjs
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8111/api/v1/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "8111:8111"

  web:
    <<: *app-base
    container_name: matchup_web_dev
    command: pnpm --filter web dev
    environment:
      TZ: Asia/Seoul
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: /api/v1
      INTERNAL_API_ORIGIN: http://api:8111
      NEXT_PUBLIC_WS_URL: http://localhost:8111
      WATCHPACK_POLLING: "true"
    depends_on:
      deps:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    ports:
      - "3003:3003"

volumes:
  postgres_data:
  redis_data:
  root_node_modules_v3:
  api_node_modules_v3:
  web_node_modules_v3:
