x-app-base: &app-base
  build:
    context: .
    dockerfile: deploy/Dockerfile.dev
  working_dir: /app
  volumes:
    - .:/app
    - root_node_modules:/app/node_modules
    - api_node_modules:/app/apps/api/node_modules
    - web_node_modules:/app/apps/web/node_modules
  environment:
    TZ: Asia/Seoul

services:
  postgres:
    image: postgres:16-alpine
    container_name: matchup_postgres_dev
    environment:
      POSTGRES_USER: matchup_user
      POSTGRES_PASSWORD: matchup_password
      POSTGRES_DB: matchup_dev
    # No external port — internal Docker network only.
    # Access from host: `make db-studio` or `docker exec -it matchup_postgres_dev psql -U matchup_user matchup_dev`
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matchup_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: matchup_redis_dev
    # No external port — internal Docker network only.
    # Access from host: `docker exec -it matchup_redis_dev redis-cli`
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    <<: *app-base
    container_name: matchup_api_dev
    command: sh -c "pnpm --filter api db:generate && pnpm --filter api dev"
    environment:
      TZ: Asia/Seoul
      DATABASE_URL: postgresql://matchup_user:matchup_password@postgres:5432/matchup_dev
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret
      API_PORT: 8111
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8111:8111"

  web:
    <<: *app-base
    container_name: matchup_web_dev
    command: pnpm --filter web dev
    environment:
      TZ: Asia/Seoul
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: /api/v1
      INTERNAL_API_ORIGIN: http://api:8111
      NEXT_PUBLIC_WS_URL: http://localhost:8111
      WATCHPACK_POLLING: "true"
    depends_on:
      api:
        condition: service_started
    ports:
      - "3003:3003"

volumes:
  postgres_data:
  redis_data:
  root_node_modules:
  api_node_modules:
  web_node_modules:
