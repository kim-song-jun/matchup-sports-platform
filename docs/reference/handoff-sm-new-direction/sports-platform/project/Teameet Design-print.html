<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>Teameet — Design Review (Print)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body {
    background: #f4f5f7;
    font-family: 'Pretendard', sans-serif;
    margin: 0;
    padding: 0;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* on-screen layout — stacked pages with visible page breaks */
  .pr-doc {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 48px 16px;
  }
  .pr-cover {
    width: 100%;
    max-width: 900px;
    padding: 64px 48px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
    text-align: center;
  }
  .pr-cover h1 { font-size: 36px; font-weight: 700; margin: 0 0 12px; color: #191f28; letter-spacing: -0.02em; }
  .pr-cover p { font-size: 15px; color: #6b7684; margin: 0; line-height: 1.6; }
  .pr-cover .pr-meta { margin-top: 28px; display: flex; justify-content: center; gap: 32px; font-size: 13px; color: #8b95a1; }
  .pr-cover .pr-meta b { color: #191f28; font-weight: 700; font-size: 20px; display: block; }

  .pr-section-title {
    width: 100%;
    max-width: 900px;
    padding: 24px 8px 0;
    font-size: 20px;
    font-weight: 700;
    color: #191f28;
    letter-spacing: -0.01em;
  }
  .pr-section-title small {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #6b7684;
    margin-top: 6px;
  }

  .pr-page {
    background: #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
    border-radius: 12px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .pr-label {
    font-size: 13px;
    font-weight: 600;
    color: #4e5968;
    letter-spacing: -0.01em;
  }
  .pr-label small {
    font-weight: 500;
    color: #8b95a1;
    margin-left: 8px;
  }
  .pr-frame {
    border: 1px solid #e5e8eb;
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
    position: relative;
    flex: none;
  }
  .pr-frame > * {
    /* ensure component roots fill the frame and don't overflow */
    width: 100%;
    height: 100%;
  }

  /* print — one artboard per page at native pixel size */
  @media print {
    @page { margin: 10mm; }
    @page :first { margin: 15mm; }
    html, body { background: #fff; }
    .pr-doc { padding: 0; gap: 0; }
    .pr-cover {
      box-shadow: none;
      border-radius: 0;
      padding: 0;
      width: auto;
      break-after: page;
      page-break-after: always;
    }
    .pr-section-title {
      max-width: none;
      padding: 0 0 8px;
      break-before: page;
      page-break-before: always;
      break-after: avoid;
      page-break-after: avoid;
    }
    .pr-section-title:first-of-type {
      break-before: auto;
    }
    .pr-page {
      box-shadow: none;
      border-radius: 0;
      padding: 0;
      gap: 10px;
      break-inside: avoid;
      page-break-inside: avoid;
      break-before: page;
      page-break-before: always;
    }
    /* first page after a section title should NOT start a new page */
    .pr-section-title + .pr-page {
      break-before: avoid;
      page-break-before: avoid;
    }
    .pr-frame {
      border: 1px solid #e5e8eb;
      box-shadow: none;
    }
  }
</style>
</head>

<script type="text/babel" data-presets="env,react">
// Print-only shim replacements for DesignCanvas / DCSection / DCArtboard.
// Flattens the canvas: each artboard renders at its native pixel dimensions
// on its own printed page, preceded by a section header and a small label.

function PrintDoc({ title, subtitle, children }) {
  // Count all artboards across sections for the cover card.
  let artboardCount = 0;
  let sectionCount = 0;
  React.Children.forEach(children, section => {
    if (!React.isValidElement(section)) return;
    sectionCount++;
    React.Children.forEach(section.props.children, ab => {
      if (React.isValidElement(ab)) artboardCount++;
    });
  });

  return (
    <div className="pr-doc">
      <div className="pr-cover">
        <h1>{title}</h1>
        <p>{subtitle}</p>
        <div className="pr-meta">
          <div><b>{sectionCount}</b>sections</div>
          <div><b>{artboardCount}</b>screens</div>
          <div><b>Toss-based</b>design system</div>
        </div>
      </div>
      {children}
    </div>
  );
}

function PrintSection({ title, subtitle, children }) {
  return (
    <>
      <div className="pr-section-title">
        {title}
        {subtitle && <small>{subtitle}</small>}
      </div>
      {children}
    </>
  );
}

function PrintArtboard({ label, width, height, children }) {
  return (
    <div className="pr-page">
      <div className="pr-label">
        {label}
        <small>{width} × {height}</small>
      </div>
      <div className="pr-frame" style={{ width, height }}>
        {children}
      </div>
    </div>
  );
}

// Swap the canvas components for the print variants. The screens-*.jsx files
// reference these by name, so we alias globally before rendering.
window.DesignCanvas = PrintDoc;
window.DCSection    = PrintSection;
window.DCArtboard   = PrintArtboard;

// Also expose as locals for the JSX below.

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Auto-print once fonts + React render are settled.
// Skip when embedded in the design tool's iframe so preview stays usable;
// only trigger when opened via the print tool (new tab / top-level window).
(async () => {
  if (window.top !== window.self) return;
  try { await document.fonts.ready; } catch (e) {}
  // Give React + babel one more frame + buffer to settle layout.
  await new Promise(r => setTimeout(r, 800));
  window.print();
})();
</script>
</body>
</html>
