          <DCArtboard id="m11-mb-motion" label="m11-mb-motion" width={375} height={812}>
            <M11MotionBoard/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      {tweaks && (
        <div style={{
          position: 'fixed', bottom: 20, right: 20, zIndex: 1000,
          width: 280, padding: 18, borderRadius: 14,
          background: 'var(--bg)', border: '1px solid var(--border)',
          boxShadow: 'var(--sh-2)',
          fontFamily: 'var(--font)',
          color: 'var(--text-strong)',
        }}>
          <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 14 }}>Tweaks</div>
          <div style={{ fontSize: 12, color: 'var(--text-muted)', fontWeight: 600, marginBottom: 8 }}>홈 Variant</div>
          <div style={{ display: 'flex', gap: 6, marginBottom: 16 }}>
            {['A', 'B', 'C'].map(v => (
              <button key={v} onClick={() => { setVariant(v); persist({ homeVariant: v }); }}
                style={{
                  flex: 1, height: 36, borderRadius: 8,
                  background: variant === v ? 'var(--blue500)' : 'var(--grey100)',
                  color: variant === v ? 'var(--static-white)' : 'var(--grey700)',
                  fontSize: 13, fontWeight: 700,
                }}>{v}</button>
            ))}
          </div>
          <div style={{ fontSize: 11, color: 'var(--text-caption)', marginTop: 12, lineHeight: 1.5 }}>
            Home 섹션에서 선택한 variant가 강조됩니다. 프로토타입은 light-only 기준입니다.
          </div>
        </div>
      )}
    </>
  );
}

function SMNewVisibilityStyle({ mode }) {
  if (mode === 'all') return null;
  const ids =
    mode === 'core'
      ? SM_NEW_CORE_SECTIONS
      : mode === 'core-grid'
        ? [...SM_NEW_CORE_SECTIONS, ...SM_NEW_CORE_GRID_SECTIONS]
        : mode === 'candidate'
          ? SM_NEW_CANDIDATE_SECTIONS
          : mode === 'reference'
            ? SM_NEW_REFERENCE_SECTIONS
            : [];
  const selectors = ids.map((id) => `[data-dc-section="${id}"]`).join(',');
  return (
    <style>{`
      [data-dc-section]{display:none !important;}
      ${selectors}{display:block !important;}
    `}</style>
  );
}

  const [tab, setTab] = useState('core');

  const reference = [

    ['global-shell', '00i Shell'],
    ['design-system-foundation', '00k Foundation'],

    ['prototype-audit', '00n Audit'],

  const core = [
    ['auth-onboarding', '01 인증'],

    ['m04-grid', 'M04 팀'],
    ['m08-grid', 'M08 용병'],
    ['m11-grid', 'M11 안전'],
    ['m12-grid', 'M12 커뮤니티'],
    ['m13-grid', 'M13 마이'],
    ['m14-grid', 'M14 결제'],
    ['m18-grid', 'M18 관리자'],
    ['m19-grid', 'M19 공통'],

  const active = tab === 'reference' ? reference : tab === 'candidate' ? candidate : tab === 'grid' ? grids : core;

  const setModeAndJump = (mode, target) => {

    border: '1px solid rgba(17,24,39,.12)',
    background: 'rgba(255,255,255,.94)',

    backdropFilter: 'blur(16px)',

  return (

            <button onClick={() => setModeAndJump('core-grid', 'auth-onboarding')} style={{ ...buttonStyle, background: viewMode === 'core-grid' ? '#111827' : '#fff', color: viewMode === 'core-grid' ? '#fff' : '#374151' }}>
