      : mode === 'core'
      ? SM_NEW_CORE_SECTIONS
      : mode === 'core-grid'
        ? [...SM_NEW_CORE_SECTIONS, ...SM_NEW_CORE_GRID_SECTIONS]
        : mode === 'prep-15'
          ? SM_FIRST_DESIGN_PREP_15_SECTIONS
        : mode === 'desktop'
          ? SM_NEW_DESKTOP_SECTIONS
          : mode === 'archive'
            ? SM_NEW_ARCHIVE_SECTIONS
        : mode === 'candidate'
          ? SM_NEW_CANDIDATE_SECTIONS
          : mode === 'reference'
            ? SM_NEW_REFERENCE_SECTIONS

  const selectors = ids.map((id) => `[data-dc-section="${id}"]`).join(',');
  return (
    <style>{`
      [data-dc-section]{display:none !important;}
      ${selectors}{display:block !important;}
    `}</style>
  );
}

    height: 32,
    borderRadius: 8,
    border: '1px solid rgba(17,24,39,.1)',
    background: '#fff',
    color: '#374151',
    fontSize: 12,
    fontWeight: 700,
    cursor: 'pointer',
  };
  const tabStyle = (id) => ({
    ...buttonStyle,
    height: 30,
    background: tab === id ? '#3182f6' : '#f3f4f6',
    color: tab === id ? '#fff' : '#4b5563',
    borderColor: tab === id ? '#3182f6' : 'transparent',
  });

  return (
    <div style={panelStyle}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, padding: '12px 12px 10px' }}>
        <button onClick={() => setOpen(!open)} style={{ ...buttonStyle, width: open ? 86 : 106, background: '#111827', color: '#fff' }}>
          {open ? '패널 접기' : '보기 패널'}
        </button>
        {open && (
          <div style={{ display: 'flex', gap: 6 }}>
            <button onClick={() => window.__dcSetScale?.(.55)} style={{ ...buttonStyle, width: 44 }}>55%</button>
            <button onClick={() => window.__dcSetScale?.(.85)} style={{ ...buttonStyle, width: 44 }}>85%</button>
            <button onClick={() => window.__dcResetView?.()} style={{ ...buttonStyle, width: 54 }}>리셋</button>
          </div>
        )}
      </div>

      {open && (
        <div style={{ padding: '0 12px 12px' }}>
          <div style={{ fontSize: 14, fontWeight: 800, marginBottom: 4 }}>SM New Direction</div>
          <div style={{ fontSize: 12, lineHeight: 1.5, color: '#6b7280', marginBottom: 10 }}>
            섹션 버튼으로 바로 이동합니다. 휠은 확대/축소, 트랙패드는 이동입니다.
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 6, marginBottom: 8 }}>
            <button onClick={() => setModeAndJump('core-original', 'auth-onboarding')} style={{ ...buttonStyle, background: viewMode === 'core-original' ? '#111827' : '#fff', color: viewMode === 'core-original' ? '#fff' : '#374151' }}>
              Core 원본
            </button>
            <button onClick={() => setModeAndJump('core-final', 'core-shell-sm-final')} style={{ ...buttonStyle, background: viewMode === 'core-final' ? '#111827' : '#fff', color: viewMode === 'core-final' ? '#fff' : '#374151' }}>
              Core 최종
            </button>
            <button onClick={() => { setViewMode('all'); setTimeout(() => window.__dcResetView?.(), 80); }} style={{ ...buttonStyle, background: viewMode === 'all' ? '#111827' : '#fff', color: viewMode === 'all' ? '#fff' : '#374151' }}>
              전체
            </button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 6, marginBottom: 6 }}>
            <button onClick={() => setModeAndJump('complete', 'core-shell-sm-final')} style={{ ...buttonStyle, background: viewMode === 'complete' ? '#111827' : '#fff', color: viewMode === 'complete' ? '#fff' : '#374151' }}>
              1차 디자인 완료
            </button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 6, marginBottom: 10 }}>
            <button onClick={() => setModeAndJump('prep-15', 'tournaments-sm-final-15')} style={{ ...buttonStyle, background: viewMode === 'prep-15' ? '#111827' : '#fff', color: viewMode === 'prep-15' ? '#fff' : '#374151' }}>
              15번 예비
            </button>
            <button onClick={() => setModeAndJump('candidate', 'lessons')} style={{ ...buttonStyle, background: viewMode === 'candidate' ? '#111827' : '#fff', color: viewMode === 'candidate' ? '#fff' : '#374151' }}>
              후보만
            </button>
            <button onClick={() => setModeAndJump('reference', 'toss-dna')} style={{ ...buttonStyle, background: viewMode === 'reference' ? '#111827' : '#fff', color: viewMode === 'reference' ? '#fff' : '#374151' }}>
              기준만
            </button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 6, marginBottom: 10 }}>
            <button onClick={() => setModeAndJump('core-grid', 'auth-onboarding')} style={{ ...buttonStyle, background: viewMode === 'core-grid' ? '#111827' : '#fff', color: viewMode === 'core-grid' ? '#fff' : '#374151' }}>
              Core+Grid
            </button>
            <button onClick={() => setModeAndJump('desktop', 'desktop-web')} style={{ ...buttonStyle, background: viewMode === 'desktop' ? '#111827' : '#fff', color: viewMode === 'desktop' ? '#fff' : '#374151' }}>
              데스크탑
            </button>
            <button onClick={() => setModeAndJump('archive', 'home-discovery-toss-canonical')} style={{ ...buttonStyle, background: viewMode === 'archive' ? '#111827' : '#fff', color: viewMode === 'archive' ? '#fff' : '#374151' }}>
              보관
            </button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6, marginBottom: 6 }}>
            <button onClick={() => setTab('original')} style={tabStyle('original')}>원본</button>
            <button onClick={() => setTab('final')} style={tabStyle('final')}>최종</button>
            <button onClick={() => setTab('grid')} style={tabStyle('grid')}>Grid</button>
            <button onClick={() => setTab('prep15')} style={tabStyle('prep15')}>15예비</button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6, marginBottom: 10 }}>
            <button onClick={() => setTab('candidate')} style={tabStyle('candidate')}>후보</button>
            <button onClick={() => setTab('desktop')} style={tabStyle('desktop')}>데탑</button>
            <button onClick={() => setTab('archive')} style={tabStyle('archive')}>보관</button>
            <button onClick={() => setTab('reference')} style={tabStyle('reference')}>기준</button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6, maxHeight: '58vh', overflow: 'auto', paddingRight: 2 }}>
            {active.map(([sectionId, label]) => (
              <button key={sectionId} onClick={() => onJump(sectionId)} style={{ ...buttonStyle, minHeight: 34, textAlign: 'left', padding: '0 9px' }}>
                {label}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
